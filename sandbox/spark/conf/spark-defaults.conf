# spark-notebook (tabulario/spark-iceberg) の設定
# Hadoop catalog + MinIO を使用（REST catalog サービスは不要）

spark.sql.extensions                                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.defaultCatalog                               local

spark.sql.catalog.local                                org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type                           hadoop
spark.sql.catalog.local.warehouse                      s3a://warehouse/

# Iceberg S3FileIO (AWS SDK v2 via iceberg-aws-bundle)
spark.sql.catalog.local.io-impl                        org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.local.s3.endpoint                    http://minio:9000
spark.sql.catalog.local.s3.path-style-access           true
spark.sql.catalog.local.s3.access-key-id               admin
spark.sql.catalog.local.s3.secret-access-key           password

# Hadoop S3A filesystem (AWS SDK v1 via hadoop-aws)
spark.hadoop.fs.s3a.endpoint                           http://minio:9000
spark.hadoop.fs.s3a.access.key                         admin
spark.hadoop.fs.s3a.secret.key                         password
spark.hadoop.fs.s3a.path.style.access                  true
spark.hadoop.fs.s3a.impl                               org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider           org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled             false
