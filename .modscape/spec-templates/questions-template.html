<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PIPELINE_TITLE}} — Questions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; padding: 2rem; }
  .container { max-width: 900px; margin: 0 auto; }
  header { border-bottom: 1px solid #334155; padding-bottom: 1.5rem; margin-bottom: 2rem; }
  h1 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; margin-bottom: 0.75rem; }
  .summary-pills { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .pill-open     { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
  .pill-assumed  { background: #422006; color: #fdba74; border: 1px solid #f97316; }
  .pill-answered { background: #052e16; color: #86efac; border: 1px solid #22c55e; }

  .q-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
  .q-item { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; overflow: hidden; }
  .q-item.open     { border-left: 3px solid #ef4444; }
  .q-item.assumed  { border-left: 3px solid #f97316; }
  .q-item.answered { border-left: 3px solid #22c55e; }
  .q-header { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.875rem 1rem; }
  .q-id { font-family: monospace; font-size: 0.75rem; font-weight: 700; padding: 0.125rem 0.5rem; border-radius: 0.25rem; flex-shrink: 0; }
  .q-id-open     { background: #450a0a; color: #fca5a5; }
  .q-id-assumed  { background: #422006; color: #fdba74; }
  .q-id-answered { background: #052e16; color: #86efac; }
  .q-text { color: #e2e8f0; font-size: 0.9rem; flex: 1; }
  .q-meta { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }
  .q-table { font-family: monospace; font-size: 0.75rem; color: #64748b; background: #0f172a; padding: 0.1rem 0.4rem; border-radius: 0.25rem; }
  .q-date { font-size: 0.7rem; color: #475569; }
  .q-body { padding: 0 1rem 0.875rem 1rem; }
  .q-answer, .q-assumption { font-size: 0.85rem; padding: 0.625rem 0.875rem; border-radius: 0.375rem; }
  .q-answer    { background: #052e16; color: #86efac; border: 1px solid #166534; }
  .q-assumption { background: #422006; color: #fdba74; border: 1px solid #7c2d12; }
  .q-answer::before    { content: '✓ '; font-weight: 700; }
  .q-assumption::before { content: '⚠ Assumption: '; font-weight: 700; }

  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn { padding: 0.25rem 0.875rem; border-radius: 9999px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: #334155; color: #e2e8f0; border-color: #475569; }

  section { margin-bottom: 2rem; }
  h2 { font-size: 0.9rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }

  footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #1e293b; font-size: 0.75rem; color: #475569; }
  pre { background: #0d1117; border: 1px solid #30363d; border-radius: 0.5rem; padding: 1rem 1.25rem; overflow-x: auto; font-family: 'SF Mono','Fira Code','Cascadia Code',monospace; font-size: 0.85rem; line-height: 1.7; margin: 0.75rem 0; color: #e2e8f0; }
  code { font-family: 'SF Mono','Fira Code','Cascadia Code',monospace; font-size: 0.875em; background: #1e293b; color: #93c5fd; padding: 0.125rem 0.375rem; border-radius: 0.25rem; border: 1px solid #334155; }
  pre code { background: none; color: inherit; padding: 0; border: none; font-size: inherit; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>{{PIPELINE_TITLE}} — Questions</h1>
    <div class="summary-pills">
      <span class="pill pill-open">{{COUNT_OPEN}} open</span>
      <span class="pill pill-assumed">{{COUNT_ASSUMED}} assumed</span>
      <span class="pill pill-answered">{{COUNT_ANSWERED}} answered</span>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterQ('all')">All</button>
    <button class="filter-btn" onclick="filterQ('open')">Open</button>
    <button class="filter-btn" onclick="filterQ('assumed')">Assumed</button>
    <button class="filter-btn" onclick="filterQ('answered')">Answered</button>
  </div>

  <div class="q-list" id="qList">
    <!-- Repeat per question. Set class on q-item and q-id accordingly. -->
    <!--
    <div class="q-item open" data-status="open">
      <div class="q-header">
        <span class="q-id q-id-open">Q-001</span>
        <span class="q-text">What key joins orders and customers?</span>
        <div class="q-meta">
          <span class="q-table">fct_orders</span>
          <span class="q-date">2026-05-01</span>
        </div>
      </div>
    </div>

    <div class="q-item assumed" data-status="assumed">
      <div class="q-header">
        <span class="q-id q-id-assumed">Q-002</span>
        <span class="q-text">Is updated_at nullable?</span>
        <div class="q-meta"><span class="q-date">2026-05-01</span></div>
      </div>
      <div class="q-body">
        <div class="q-assumption">NULL rate is assumed < 1% based on source system docs.</div>
      </div>
    </div>

    <div class="q-item answered" data-status="answered">
      <div class="q-header">
        <span class="q-id q-id-answered">Q-003</span>
        <span class="q-text">What is the grain of fct_orders?</span>
        <div class="q-meta"><span class="q-date">2026-05-01</span></div>
      </div>
      <div class="q-body">
        <div class="q-answer">One row per order line item.</div>
      </div>
    </div>
    -->
    {{QUESTIONS}}
  </div>

  <footer>Generated by modscape:spec · {{GENERATED_DATE}}</footer>
</div>
<script>
  function filterQ(status) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.q-item').forEach(item => {
      item.style.display = (status === 'all' || item.dataset.status === status) ? '' : 'none';
    });
  }
</script>
</body>
</html>
