  stg_customers:
    x: 40
    'y': 80
    parentId: staging_domain
  stg_plans:
    x: 40
    'y': 320
    parentId: staging_domain
  dim_domain:
    x: 680
    'y': 0
    width: 440
    height: 480
  dim_customers:
    x: 720
    'y': 80
    parentId: dim_domain
  dim_plans:
    x: 720
    'y': 320
    parentId: dim_domain
  core_domain:
    x: 1200
    'y': 160
    width: 440
    height: 160
  fct_subscription_events:
    x: 1240
    'y': 200
    parentId: core_domain
  mart_domain:
    x: 1720
    'y': 0
    width: 440
    height: 480
  mart_arr:
    x: 1760
    'y': 80
    parentId: mart_domain
  mart_revenue_summary:
    x: 1760
    'y': 320
