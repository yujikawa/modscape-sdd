relationships:
  - id: rel_fct_dim_subscriptions
    from:
      table: fct_subscription_events
      column:
        - subscription_id
    to:
      table: dim_subscriptions
      column:
        - subscription_id
    type: many-to-one
    description: サブスクリプションイベント → サブスクリプションディメンション（N:1）
lineage:
  - id: lin_stg_fct
    from: stg_billing_subscriptions
    to: fct_subscription_events
    join_type: none
    description: ステージングからイベント生成
  - id: lin_stg_dim
    from: stg_billing_subscriptions
    to: dim_subscriptions
  - id: lin_fct_mart_arr
    from: fct_subscription_events
    to: mart_arr
    join_type: none
    description: annual イベントを plan × country 粒度で集計（後方互換）
  - id: lin_mart_arr_dash
    from: mart_arr
    to: revenue_dashboard
    description: ARR トレンドをダッシュボードに供給
  - id: lin_fct_revenue_summary
    from: fct_subscription_events
    to: mart_revenue_summary
    join_type: none
    description: 多軸集計マートへ集約（AC-004）
  - id: lin_revenue_summary_dash
    from: mart_revenue_summary
    to: revenue_dashboard
    description: 多軸 ARR/MRR をダッシュボードに供給
domains:
  - id: staging_domain
    name: Staging
    display:
      color: rgba(16,185,129,0.1)
    members:
      - stg_billing_subscriptions
  - id: core_domain
    name: Core
    display:
      color: rgba(234,179,8,0.1)
    members:
      - fct_subscription_events
  - id: mart_domain
    name: Mart
    display:
      color: rgba(59,130,246,0.1)
    members:
      - mart_arr
      - mart_revenue_summary
  - id: dim_domain
    name: Dimensions
    display:
      color: rgba(249,115,22,0.1)
    members:
      - dim_subscriptions
consumers:
  - id: revenue_dashboard
    name: Revenue Dashboard
    description: Finance チーム向け ARR/MRR トレンドダッシュボード
    display:
      icon: 📊
annotations: []
