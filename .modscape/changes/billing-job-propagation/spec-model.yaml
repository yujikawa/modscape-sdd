version: 2.0.0
tables:
  - id: stg_billing_subscriptions
    conceptual:
      name: Billing Subscriptions (Staging)
      kind: table
      description: Raw billing.subscriptions を型変換・NULL補完したステージング層。annual_price_usd が NULL の場合は monthly_price_usd × 12 でフォールバック済み。
      tags:
        - WHAT
    physical:
      name: 02_stg__billing_subscriptions.csv
      strategy: table
    display:
      icon: 🧹
    columns:
      - id: subscription_id
        name: Subscription ID
        type: String
        isPrimaryKey: true
      - id: customer_id
        name: Customer ID
        type: String
        isForeignKey: true
      - id: plan_id
        name: Plan ID
        type: String
      - id: status
        name: Status
        type: String
        description: active | cancelled
      - id: billing_cycle
        name: Billing Cycle
        type: String
        description: monthly | annual
      - id: monthly_price_usd
        name: Monthly Price (USD)
        type: Decimal
      - id: annual_price_usd
        name: Annual Price (USD)
        type: Decimal
        description: NULL の場合は monthly_price_usd × 12 でフォールバック済み
        expression: COALESCE(annual_price_usd, monthly_price_usd * 12)
      - id: start_date
        name: Start Date
        type: Date
      - id: cancelled_date
        name: Cancelled Date
        type: Date
      - id: trial_start_date
        name: Trial Start Date
        type: Date
      - id: trial_end_date
        name: Trial End Date
        type: Date
      - id: loaded_at
        name: Loaded At
        type: Timestamp
      - id: job
        name: Job
        type: String
    sampleData:
      - - sub_001
        - cus_A1
        - plan_pro
        - active
        - monthly
        - 49
        - 588
        - '2024-01-15'
        - null
        - '2024-01-01'
        - '2024-01-14'
        - '2024-03-01T12:00:00Z'
        - Engineer
      - - sub_002
        - cus_A2
        - plan_pro
        - active
        - annual
        - 49
        - 490
        - '2024-02-01'
        - null
        - null
        - null
        - '2024-02-01T10:30:00Z'
        - Manager
      - - sub_007
        - cus_A7
        - plan_enterprise
        - active
        - annual
        - 199
        - 2388
        - '2023-12-01'
        - null
        - null
        - null
        - '2024-01-15T10:00:00Z'
        - Engineer
  - id: fct_subscription_events
    conceptual:
      name: Subscription Events
      kind: fact
      description: サブスクリプションのイベント（新規・解約・トライアル転換）。dim_customers・dim_plans FK 追加（AC-003、AC-005）。
    physical:
      name: 04_fct__subscription_events.csv
      strategy: table
    columns:
      - id: event_id
        name: Event ID
        type: String
        isPrimaryKey: true
      - id: subscription_id
        name: Subscription ID
        type: String
        isForeignKey: true
      - id: customer_id
        name: Customer ID
        type: String
        isForeignKey: true
      - id: plan_id
        name: Plan ID
        type: String
        isForeignKey: true
      - id: event_date
        name: Event Date
        type: Date
        isPartitionKey: true
      - id: event_type
        name: Event Type
        type: String
        description: new_subscription | cancellation | trial_conversion | plan_upgrade
      - id: billing_cycle
        name: Billing Cycle
        type: String
      - id: mrr_amount
        name: MRR Amount (USD)
        type: Decimal
        additivity: fully
      - id: arr_amount
        name: ARR Amount (USD)
        type: Decimal
        description: annual の場合のみ。monthly は NULL
        additivity: fully
      - id: mrr_delta
        name: MRR Delta (USD)
        type: Decimal
        additivity: fully
      - id: country_code
        name: Country Code
        type: String
        description: dim_customers から補完（AC-005、D-003 解決）
      - id: customer_segment
        name: Customer Segment
        type: String
        description: dim_customers から補完（AC-003）
      - id: plan_tier
        name: Plan Tier
        type: String
        description: dim_plans から補完（AC-003）
      - id: plan_category
        name: Plan Category
        type: String
        description: dim_plans から補完（AC-003）
      - id: job
        name: Job
        type: String
    metadata:
      tags:
        - WHAT
        - WHEN
        - HOW_MUCH
    sampleData:
      - - evt_001
        - sub_001
        - cus_A1
        - plan_pro
        - '2024-01-15'
        - new_subscription
        - monthly
        - 49
        - null
        - 49
        - JP
        - SMB
        - Pro
        - Sales-Assisted
        - Engineer
      - - evt_002
        - sub_002
        - cus_A2
        - plan_pro
        - '2024-02-01'
        - new_subscription
        - annual
        - 40.83
        - 490
        - 40.83
        - US
        - Mid-Market
        - Pro
        - Sales-Assisted
        - Manager
      - - evt_004
        - sub_004
        - cus_A4
        - plan_pro
        - '2024-03-15'
        - cancellation
        - monthly
        - 49
        - null
        - -49
        - US
        - SMB
        - Pro
        - Sales-Assisted
        - Engineer
  - id: mart_arr
    conceptual:
      name: ARR Snapshot
      kind: mart
      description: 年次 ARR スナップショット。plan × country × job 粒度（job カラム追加により粒度変更）。
    logical:
      grain:
        - year_key
        - plan_id
        - country_code
        - job
    physical:
      name: 05_mart__arr.csv
      strategy: table
    columns:
      - id: year_key
        name: Year
        type: String
        isPrimaryKey: true
      - id: plan_id
        name: Plan ID
        type: String
        isPrimaryKey: true
      - id: country_code
        name: Country Code
        type: String
        isPrimaryKey: true
      - id: job
        name: Job
        type: String
        isPrimaryKey: true
      - id: active_subscription_count
        name: Active Subscriptions
        type: Int
        additivity: fully
      - id: total_arr_usd
        name: Total ARR (USD)
        type: Decimal
        additivity: fully
      - id: avg_arr_per_subscription_usd
        name: Avg ARR per Subscription (USD)
        type: Decimal
        additivity: non
      - id: snapshot_date
        name: Snapshot Date
        type: Date
    metadata:
      tags:
        - HOW_MUCH
        - WHEN
    sampleData:
      - - '2024'
        - plan_pro
        - US
        - Engineer
        - 1
        - 490
        - 490
        - '2024-12-31'
      - - '2024'
        - plan_enterprise
        - US
        - Manager
        - 1
        - 1990
        - 1990
        - '2024-12-31'
      - - '2024'
        - plan_enterprise
        - DE
        - Engineer
        - 1
        - 2388
        - 2388
        - '2024-12-31'
  - id: dim_subscriptions
    conceptual:
      name: Subscriptions
      kind: dimension
      description: サブスクリプションのディメンションテーブル。billing_cycle と annual_price_usd を保持する（AC-001）。
      tags:
        - WHO
        - WHAT
    logical:
      scd:
        type: type1
        business_key:
          - subscription_id
    physical:
      name: 03_dim__subscriptions.csv
      strategy: table
    display:
      icon: 📋
    columns:
      - id: subscription_id
        name: Subscription ID
        type: String
        isPrimaryKey: true
      - id: customer_id
        name: Customer ID
        type: String
        isForeignKey: true
      - id: plan_id
        name: Plan ID
        type: String
      - id: status
        name: Status
        type: String
        description: active | cancelled
      - id: billing_cycle
        name: Billing Cycle
        type: String
        description: monthly | annual (AC-001)
      - id: annual_price_usd
        name: Annual Price (USD)
        type: Decimal
        description: NULL の場合はフォールバック済みの値（AC-001, AC-005）
      - id: mrr_amount
        name: MRR Amount (USD)
        type: Decimal
        description: annual の場合は annual_price_usd / 12
        additivity: fully
      - id: start_date
        name: Start Date
        type: Date
      - id: cancelled_date
        name: Cancelled Date
        type: Date
      - id: country_code
        name: Country Code
        type: String
      - id: job
        name: Job
        type: String
    sampleData:
      - - sub_001
        - cus_A1
        - plan_pro
        - active
        - monthly
        - 588
        - 49
        - '2024-01-15'
        - null
        - JP
        - Engineer
      - - sub_002
        - cus_A2
        - plan_pro
        - active
        - annual
        - 490
        - 40.83
        - '2024-02-01'
        - null
        - US
        - Manager
      - - sub_007
        - cus_A7
        - plan_enterprise
        - active
        - annual
        - 2388
        - 199
        - '2023-12-01'
        - null
        - DE
        - Engineer
  - id: mart_revenue_summary
    conceptual:
      name: Revenue Summary
      kind: mart
      description: 多軸 ARR/MRR 集計マート。country × segment × plan_tier × job 粒度（job カラム追加により粒度変更）。
    logical:
      grain:
        - year_key
        - month_key
        - plan_tier
        - country_code
        - customer_segment
        - job
    physical:
      name: 10_mart__revenue_summary.csv
      strategy: table
    columns:
      - id: year_key
        name: Year
        type: String
        isPrimaryKey: true
      - id: month_key
        name: Month
        type: String
        isPrimaryKey: true
      - id: plan_tier
        name: Plan Tier
        type: String
        isPrimaryKey: true
      - id: plan_category
        name: Plan Category
        type: String
      - id: country_code
        name: Country Code
        type: String
        isPrimaryKey: true
      - id: customer_segment
        name: Customer Segment
        type: String
        isPrimaryKey: true
      - id: job
        name: Job
        type: String
        isPrimaryKey: true
      - id: active_subscriptions
        name: Active Subscriptions
        type: Int
        additivity: fully
      - id: total_mrr_usd
        name: Total MRR (USD)
        type: Decimal
        additivity: fully
      - id: total_arr_usd
