tables:
  - id: sat_subscription_status
    name: Subscription Status
    physical_name: sat_subscription_status
    appearance:
      type: satellite
      icon: 🛰️
    conceptual:
      description: Current and historical status of a subscription (active, trialing, cancelled, churned).
    columns:
      - id: subscription_hk
        logical:
          name: Subscription Hash Key
          type: String
          isForeignKey: true
      - id: load_dts
        logical:
          name: Load Date
          type: Timestamp
          isPrimaryKey: true
      - id: hash_diff
        logical:
          name: Hash Diff
          type: String
      - id: status
        logical:
          name: Status
          type: String
      - id: trial_start_date
        logical:
          name: Trial Start Date
          type: Date
      - id: trial_end_date
        logical:
          name: Trial End Date
          type: Date
      - id: start_date
        logical:
          name: Start Date
          type: Date
      - id: cancelled_date
        logical:
          name: Cancelled Date
          type: Date
      - id: mrr_amount
        logical:
          name: MRR Amount (USD)
          type: Decimal
      - id: billing_cycle
        logical:
          name: Billing Cycle
          type: String
      - id: annual_price_usd
        logical:
          name: Annual Price (USD)
          type: Decimal
    sampleData:
      - - s1a2b3c4
        - '2024-01-15T00:00:00.000Z'
        - hd5
        - active
        - '2024-01-08T00:00:00.000Z'
        - '2024-01-14T00:00:00.000Z'
        - '2024-01-15T00:00:00.000Z'
        - null
        - 29
      - - s5d6e7f8
        - '2024-02-01T00:00:00.000Z'
        - hd6
        - trialing
        - '2024-02-01T00:00:00.000Z'
        - '2024-02-14T00:00:00.000Z'
        - null
        - null
        - 0
  - id: fct_subscription_events
    name: Subscription Events
    logical_name: Subscription Event Fact
    physical_name: fct_subscription_events
    appearance:
      type: fact
      icon: 📊
    conceptual:
      description: One row = one subscription status change event. Captures trial_start, activated, upgraded, downgraded, cancelled.
      tags:
        - WHAT
        - HOW_MUCH
        - WHEN
    implementation:
      materialization: incremental
      incremental_strategy: merge
      unique_key:
        - subscription_id
        - event_date
        - event_type
      partition_by:
        - field: event_date
          granularity: day
    columns:
      - id: subscription_id
        logical:
          name: Subscription ID
          type: String
          isPrimaryKey: true
      - id: user_key
        logical:
          name: User Key
          type: Int
          isForeignKey: true
      - id: plan_key
        logical:
          name: Plan Key
          type: Int
          isForeignKey: true
      - id: date_key
        logical:
          name: Date Key
          type: Int
          isForeignKey: true
      - id: event_date
        logical:
          name: Event Date
          type: Date
          isPartitionKey: true
      - id: event_type
        logical:
          name: Event Type
          type: String
      - id: mrr_amount
        logical:
          name: MRR Amount (USD)
          type: Decimal
          additivity: fully
      - id: mrr_delta
        logical:
          name: MRR Delta (USD)
          type: Decimal
          additivity: fully
      - id: is_churn
        logical:
          name: Is Churn
          type: Boolean
      - id: is_new_business
        logical:
          name: Is New Business
          type: Boolean
      - id: arr_amount
        logical:
          name: ARR Amount (USD)
          type: Decimal
          additivity: fully
    sampleData:
      - - SUB-10001
        - 1
        - 2
        - 20240115
        - '2024-01-15T00:00:00.000Z'
        - activated
        - 29
        - 29
        - false
        - true
      - - SUB-10001
        - 1
        - 3
        - 20240201
        - '2024-02-01T00:00:00.000Z'
        - upgraded
        - 99
        - 70
        - false
        - false
      - - SUB-10002
        - 2
        - 2
        - 20240301
        - '2024-03-01T00:00:00.000Z'
        - cancelled
        - 0
        - -29
        - true
        - false
  - id: mart_mrr
    name: MRR
    logical_name: Monthly Recurring Revenue
    physical_name: mart_mrr
    appearance:
      type: mart
      icon: 💰
    conceptual:
      description: Month-end MRR snapshot broken down by plan and country. Used for revenue reporting.
      tags:
        - HOW_MUCH
        - WHEN
      businessDefinitions:
        mrr: Monthly Recurring Revenue — sum of normalized monthly revenue from all active subscriptions at month end.
        new_mrr: MRR added from newly activated subscriptions this month.
        churn_mrr: MRR lost from cancellations this month.
        expansion_mrr: MRR gained from upgrades this month.
    implementation:
      materialization: table
      grain:
        - month_key
        - plan_key
        - country_code
      measures:
        - column: mrr
          agg: sum
          source_column: fct_subscription_events.mrr_amount
        - column: new_mrr
          agg: sum
          source_column: fct_subscription_events.mrr_delta
        - column: active_subscriptions
          agg: count_distinct
          source_column: fct_subscription_events.subscription_id
        - column: arr
          agg: sum
          source_column: fct_subscription_events.arr_amount
    columns:
      - id: month_key
        logical:
          name: Month Key
          type: Int
          isPrimaryKey: true
      - id: plan_key
        logical:
          name: Plan Key
          type: Int
          isPrimaryKey: true
      - id: country_code
        logical:
          name: Country Code
          type: String
          isPrimaryKey: true
      - id: mrr
        logical:
          name: MRR (USD)
          type: Decimal
          additivity: fully
      - id: new_mrr
        logical:
          name: New MRR (USD)
          type: Decimal
          additivity: fully
      - id: churn_mrr
        logical:
          name: Churn MRR (USD)
          type: Decimal
          additivity: fully
      - id: expansion_mrr
        logical:
          name: Expansion MRR (USD)
          type: Decimal
          additivity: fully
      - id: active_subscriptions
        logical:
          name: Active Subscriptions
          type: Int
          additivity: fully
      - id: arr
        logical:
          name: ARR (USD)
          type: Decimal
          additivity: fully
    sampleData: []
  - id: mart_arr
    name: ARR
    logical_name: Annual Recurring Revenue
    physical_name: mart_arr
    appearance:
      type: mart
      icon: 📈
    conceptual:
      description: Year-end ARR snapshot by plan and country. One row per year × plan × country combination with active annual subscriptions.
      tags:
        - HOW_MUCH
        - WHEN
      businessDefinitions:
        arr: Annual Recurring Revenue — sum of annual_price_usd for all active annual subscriptions at year end.
        arr_new: ARR added from newly activated annual subscriptions this year.
        arr_expansion: ARR gained from upgrades to annual plans this year.
    implementation:
      materialization: table
      grain:
        - year_key
        - plan_key
        - country_code
      measures:
        - column: arr
          agg: sum
          source_column: fct_subscription_events.arr_amount
        - column: annual_subscriptions
          agg: count_distinct
          source_column: fct_subscription_events.subscription_id
    columns:
      - id: year_key
        logical:
          name: Year Key
          type: Int
          isPrimaryKey: true
      - id: plan_key
        logical:
          name: Plan Key
          type: Int
          isPrimaryKey: true
      - id: country_code
        logical:
          name: Country Code
          type: String
          isPrimaryKey: true
      - id: arr
        logical:
          name: ARR (USD)
          type: Decimal
          additivity: fully
      - id: arr_new
        logical:
          name: New ARR (USD)
          type: Decimal
          additivity: fully
      - id: arr_expansion
        logical:
          name: Expansion ARR (USD)
          type: Decimal
          additivity: fully
      - id: annual_subscriptions
        logical:
          name: Annual Subscriptions
          type: Int
          additivity: fully
    sampleData: []
relationships: []
