# .modscape/specs/_questions.yaml
# All Q&A from SDD interactions. Use the 'table' field for table-specific questions.
# status: open | answered | assumed

questions:
  - id: Q-001
    question: "job カラムはどのテーブルまで伝播させるか？"
    answer: "stg_billing_subscriptions, fct_subscription_events, dim_subscriptions, mart_arr, mart_revenue_summary すべてに追加する"
    status: answered
    date: 2026-05-09
    change: billing-job-propagation

  - id: Q-002
    question: "mart テーブルで job カラムをどう扱うか（集計軸 or 属性列）？"
    answer: "mart_arr および mart_revenue_summary の GROUP BY に job を追加し、職業別集計軸とする"
    status: answered
    date: 2026-05-09
    change: billing-job-propagation

  - id: Q-003
    question: "job カラムの NULL 値の扱いはどうするか？"
    status: open
    date: 2026-05-09
    change: billing-job-propagation

  - id: Q-004
    question: "job カラムの取りうる値（enum）は何か？マスタリストはあるか？"
    status: open
