schema: data-platform

# Project context
context: |
  We follow Spec-Driven Data Engineering (SDDE) with Modscape.
  - Core Rules: Refer to `.modscape/rules.md` for naming, types, and layout management.
  - Source of Truth: Data models in `modscape.yaml` or `models/*.yaml`.
  - Workflow: Discovery (spec) -> Modeling (model) -> Technical Design (design) -> Plan (proposal) -> Implementation (tasks).

# Per-artifact rules
rules:
  model:
    - ALWAYS consult `.modscape/rules.md` for the latest YAML schema and Golden Rules.
    - Coordinate placement: Proactively assign (x, y) to new entities to avoid overlapping.
    - Use 'conceptual.tags' to improve model searchability.
  design:
    - Align implementation (e.g., dbt models) with Modscape's logical/physical mapping.
    - Include data validation expectations for each 'satellite' or 'fact' table.
