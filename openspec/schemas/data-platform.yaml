name: data-platform
description: "A Spec-Driven Data Engineering workflow integrating Modscape and OpenSpec."

# 1. Artifact Definitions
artifacts:
  - id: spec
    generates: specs/discovery.md
    description: "Business requirements and discovery findings."
    instruction: |
      Document the business context, data sources, and requirements.
      Identify key entities and their roles (e.g., Who, What, When) before modeling.

  - id: model
    generates: modscape.yaml # Can be a directory like 'models/' if preferred
    requires: [spec]
    description: "Modscape Data Model (Conceptual, Logical, and Physical layers)"
    instruction: |
      Perform data modeling following the rules in `.modscape/rules.md`:
      1. Update existing YAML models or create new ones in the `models/` directory.
      2. Follow the 3-layer structure:
         - Conceptual: Business definition and tags.
         - Logical: Logical names and types (Source of Truth).
         - Physical: Database-specific names and constraints.
      3. Set 'appearance.type' (hub, link, satellite, fact, dimension) and appropriate icons.
      4. Layout Management:
         - When adding new tables/domains, assign initial (x, y) coordinates near related entities.
         - DO NOT leave new entities at (0, 0).
         - DO NOT overwrite existing coordinates unless requested.

  - id: design
    generates: design.md
    requires: [model]
    description: "Technical architecture and implementation design (dbt, ETL, etc.)"
    instruction: |
      Based on the finalized Modscape model, design the technical implementation:
      - Define dbt model structures (staging, intermediate, marts).
      - Specify transformation logic and data quality tests (e.g., unique, not_null).
      - Map Modscape's 'physical' layer to actual implementation code.

  - id: proposal
    generates: proposal.md
    requires: [design]
    description: "Implementation plan based on the confirmed design."

  - id: tasks
    generates: tasks.md
    requires: [proposal]

# 2. Custom Command Definitions
commands:
  model:
    description: "Interactive data modeling session using Modscape."
    steps:
      - action: "explore"
        optional: true
      - action: "generate"
        artifact: "model"
      - message: "Please review the Modscape preview. AI has assigned initial layout coordinates."
  design:
    description: "Design the technical implementation for the current model."
    steps:
      - action: "generate"
        artifact: "design"
