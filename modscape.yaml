  - id: fct_subscription_events
    name: Subscription Events
    logical_name: Subscription Event Fact
    physical_name: fct_subscription_events
    appearance:
      type: fact
      icon: 📊
    conceptual:
      description: One row = one subscription status change event. Captures trial_start, activated, upgraded, downgraded, cancelled.
      tags:
        - WHAT
        - HOW_MUCH
        - WHEN
    implementation:
      materialization: incremental
      incremental_strategy: merge
      unique_key:
        - subscription_id
        - event_date
        - event_type
      partition_by:
        - field: event_date
          granularity: day
    columns:
      - id: subscription_id
        logical:
          name: Subscription ID
          type: String
          isPrimaryKey: true
      - id: user_key
        logical:
          name: User Key
          type: Int
          isForeignKey: true
      - id: plan_key
        logical:
          name: Plan Key
          type: Int
          isForeignKey: true
      - id: date_key
        logical:
          name: Date Key
          type: Int
          isForeignKey: true
      - id: event_date
        logical:
          name: Event Date
          type: Date
          isPartitionKey: true
      - id: event_type
        logical:
          name: Event Type
          type: String
      - id: mrr_amount
        logical:
          name: MRR Amount (USD)
          type: Decimal
          additivity: fully
      - id: mrr_delta
        logical:
          name: MRR Delta (USD)
          type: Decimal
          additivity: fully
      - id: is_churn
        logical:
          name: Is Churn
          type: Boolean
      - id: is_new_business
        logical:
          name: Is New Business
          type: Boolean
    sampleData:
      - - SUB-10001
        - 1
        - 2
        - 20240115
        - '2024-01-15T00:00:00.000Z'
        - activated
        - 29
        - 29
        - false
        - true
      - - SUB-10001
        - 1
        - 3
        - 20240201
        - '2024-02-01T00:00:00.000Z'
        - upgraded
        - 99
        - 70
        - false
        - false
      - - SUB-10002
        - 2
        - 2
        - 20240301
        - '2024-03-01T00:00:00.000Z'
        - cancelled
        - 0
        - -29
        - true
        - false
  - id: mart_mrr
    name: MRR
    logical_name: Monthly Recurring Revenue
    physical_name: mart_mrr
    appearance:
      type: mart
      icon: 💰
    conceptual:
      description: Month-end MRR snapshot broken down by plan and country. Used for revenue reporting.
      tags:
        - HOW_MUCH
        - WHEN
      businessDefinitions:
        mrr: Monthly Recurring Revenue — sum of normalized monthly revenue from all active subscriptions at month end.
        new_mrr: MRR added from newly activated subscriptions this month.
        churn_mrr: MRR lost from cancellations this month.
        expansion_mrr: MRR gained from upgrades this month.
    implementation:
      materialization: table
      grain:
        - month_key
        - plan_key
        - country_code
      measures:
        - column: mrr
          agg: sum
          source_column: fct_subscription_events.mrr_amount
        - column: new_mrr
          agg: sum
          source_column: fct_subscription_events.mrr_delta
        - column: active_subscriptions
          agg: count_distinct
          source_column: fct_subscription_events.subscription_id
    columns:
      - id: month_key
        logical:
          name: Month Key
          type: Int
          isPrimaryKey: true
      - id: plan_key
        logical:
          name: Plan Key
          type: Int
          isPrimaryKey: true
      - id: country_code
        logical:
          name: Country Code
          type: String
          isPrimaryKey: true
      - id: mrr
        logical:
          name: MRR (USD)
          type: Decimal
          additivity: fully
      - id: new_mrr
        logical:
          name: New MRR (USD)
          type: Decimal
          additivity: fully
      - id: churn_mrr
        logical:
          name: Churn MRR (USD)
          type: Decimal
          additivity: fully
      - id: expansion_mrr
        logical:
          name: Expansion MRR (USD)
          type: Decimal
          additivity: fully
      - id: active_subscriptions
        logical:
          name: Active Subscriptions
          type: Int
          additivity: fully
    sampleData: []
  - id: mart_churn
    name: Churn Analysis
    logical_name: Subscription Churn Analysis
    physical_name: mart_churn
    appearance:
      type: mart
      icon: 📉
    conceptual:
      description: Monthly churn cohort analysis. Tracks retention rate by plan and signup channel.
      tags:
        - WHO
        - WHEN
      businessDefinitions:
        churn_rate: Percentage of active subscriptions at the start of a month that were cancelled by month end.
    implementation:
      materialization: table
      grain:
        - month_key
        - plan_key
        - signup_channel
      measures:
        - column: churned_count
          agg: count_distinct
          source_column: fct_subscription_events.subscription_id
        - column: churn_rate
          agg: custom
    columns:
      - id: month_key
        logical:
          name: Month Key
          type: Int
          isPrimaryKey: true
      - id: plan_key
        logical:
          name: Plan Key
          type: Int
          isPrimaryKey: true
      - id: signup_channel
        logical:
          name: Signup Channel
          type: String
          isPrimaryKey: true
      - id: active_start
        logical:
          name: Active at Month Start
          type: Int
          additivity: fully
      - id: churned_count
        logical:
          name: Churned Count
          type: Int
          additivity: fully
      - id: churn_rate
        logical:
          name: Churn Rate
          type: Decimal
          additivity: non
    sampleData: []
