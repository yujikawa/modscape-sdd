domains:
  - id: raw_vault
    name: Raw Vault
    description: Immutable historical record loaded directly from application source systems
    color: rgba(234, 179, 8, 0.08)
    members:
      - hub_user
      - hub_plan
      - hub_subscription
      - lnk_user_subscription
      - sat_user_profile
      - sat_plan_details
      - sat_subscription_status
  - id: star_schema
    name: Star Schema
    description: Conformed dimensional model built from the Raw Vault
    color: rgba(59, 130, 246, 0.08)
    members:
      - dim_users
      - dim_plans
      - dim_dates
      - fct_subscription_events
  - id: mart
    name: Data Mart
    description: Aggregated models ready for BI and product analytics consumption
    color: rgba(249, 115, 22, 0.08)
    members:
      - mart_mrr
      - mart_churn
consumers:
  - id: revenue_dashboard
    name: Revenue Dashboard
    description: Real-time MRR, ARR, and growth metrics for the finance and leadership team
    appearance:
      icon: 💰
      color: '#16a34a'
    url: https://bi.example.com/revenue
  - id: cs_report
    name: CS Weekly Report
    description: Weekly churn analysis and at-risk account alerts for the Customer Success team
    appearance:
      icon: 📋
      color: '#7c3aed'
annotations:
  - id: note_vault_to_star
    type: callout
    text: |-
      Raw Vault → Star Schema
      Hub + Satellite = Dimension
      Hub + Link + Satellite = Fact
    color: '#fef9c3'
    targetId: raw_vault
    targetType: domain
    offset:
      x: 20
      'y': -80
  - id: note_mrr_grain
    type: sticky
    text: |-
      Grain: subscription × event_date × event_type
      event_type: trial_start | activated |
                  upgraded | downgraded | cancelled
    color: '#7f7348'
    targetId: fct_subscription_events
    targetType: table
    offset:
      x: 320
      'y': 20
